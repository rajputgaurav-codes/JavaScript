<body>
    <script>
        //Find First Number Greater Than 50
          function currentArr(arr){
            let greatest = arr[0];
            for(let i =0;i <arr.length;i++){
                if(arr[i]>50){
                    return greatest = arr[i];
                }
            }
            
        }
        let check = currentArr([10,60,40,30,80,90]);;
        console.log(check);
    </script>
</body>
