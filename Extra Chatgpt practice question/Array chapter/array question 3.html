<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array question 3</title>
</head>
<body>
    <script>
        // reverse the array.
        function reverseArr(arr){
            let reverse = [];
            for ( let i = arr.length -1;i>=0;i--){
                reverse.push(arr[i]);
            }
            return reverse;
        }
        let reverse = reverseArr([10,20,30,40,50]);
        console.log("Reverse = ",reverse);
    </script>
</body>
</html>
