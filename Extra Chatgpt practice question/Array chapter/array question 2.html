<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array question 2</title>
</head>
<body>
    <script>
        //Count Occurrences
        function countarr(arr,val){
            let count = 0;
            for(let i=0;i<arr.length;i++){
                if(val === arr[i]){
                    count ++;
                }
            }
            return count;
        }
        let count = countarr([2,6,4,2,3,1,4,2],2);
        console.log("count = ",count);
    </script>
</body>
</html>
