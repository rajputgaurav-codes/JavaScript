<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array question</title>
</head>
<body>
    <script>
        //function largestEven number in the array.
        function largestEven(arr){
            let largest = -Infinity;
            for(let i=0;i<arr.length;i++){
                if(arr[i]%2===0){
                    if(arr[i]>largest){
                        largest=arr[i];
                    }
                }
            }
            return largest;
        }
        console.log(largestEven([2,7,8,25,64,88,13]))
    </script>
</body>
</html>
