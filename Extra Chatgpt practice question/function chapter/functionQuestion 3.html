<body>
    <script>
        // Palindrom function
        function checkpalindrom(str){
            let rev = "";
            for(let i = str.length -1;i>=0;i--){
                rev += str[i];
            }
             if(rev === str) return "palindrom";
             return "Not Plindrom"
        }
        console.log(checkpalindrom("madam"));
    </script>
