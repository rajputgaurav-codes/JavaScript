<!DOCTYPE html>

    <title>function question 2</title>
</head>
<body>
    <script>
        // reverse string function

        function revstr(str){
            let rev = "";
            for(let i=str.length -1;i>=0;i--){
                rev = rev + str[i];
            }
            return rev;
        }
        console.log(revstr("javascript"));
    </script>
</body>
