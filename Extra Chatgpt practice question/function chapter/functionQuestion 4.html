<body>
    <script>
        // count letter in string using function

        function countLetter(str,val){
            let count =0;
            for ( let i=0;i<str.length;i++){
                if(str[i] === val){
                    count ++;
                }
            }
            return count;
        }
        console.log(countLetter("javascript","a"));
    </script>
</body>
