<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop question</title>
</head>
<body>
    <script>
        // print multiplication of table.
        let num = 7;
        for( let i =1; i<=10;i++){
            console.log(`${num} x ${i} = `,num*i);
        }
    </script>
</body>
</html>
