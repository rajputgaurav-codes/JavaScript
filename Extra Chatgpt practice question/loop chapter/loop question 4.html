<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop question 4</title>
</head>
<body>
    <script>
        //print sum of 1 to 100 number using loop.
        
        let sum = 0;
        for(let i=1;i<=100;i++){
             sum = sum + i;
        }
        console.log(sum);
    </script>
</body>
