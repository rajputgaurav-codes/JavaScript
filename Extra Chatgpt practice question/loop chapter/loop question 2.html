<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop question</title>
</head>
<body>
    <script>

        //reverse a string

        
      let str = "hello world";
      let reverse = "";
      for(let i = str. length -1;i>=0;i--){
        reverse += str[i];
      }
      console.log(reverse);

   
    </script>
</body>
</html>
