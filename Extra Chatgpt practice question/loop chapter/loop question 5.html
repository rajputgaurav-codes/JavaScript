<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop question</title>
</head>
<body>
    <script>
        // print all number between 1 to 50 who divisible by 3.

        for(let i=1;i<=50;i++){
            if(i%3==0){
                console.log(i);
            }
        }
    </script>
</body>
