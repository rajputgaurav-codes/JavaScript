<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional question</title>
</head>
<body>
    <script>
        //check string is palindrom or not.
        let i;
        let str = "madam";
        let reverse = "";
        for( i=str.length -1;i>=0;i--){
            reverse +=str[i];
          
        }
        //check string is palindrom or not.
      
            
        
        if(str[i] == reverse[i]){
            console.log("Palindrom");
        }else{
            console.log("Not palindrom");
        }
        
        
        
    </script>
</body>
</html>
