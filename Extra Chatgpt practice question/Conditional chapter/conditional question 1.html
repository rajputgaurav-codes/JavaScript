<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional question</title>
</head>
<body>
    <script>
        // check valid password length
        let password = prompt("please enter a password");
        if(password.length < 8){
            console.log("Please enter a strong password");
        }else{
            console.log("yes , This is a correct password");
        }
    </script>
</body>
</html>
