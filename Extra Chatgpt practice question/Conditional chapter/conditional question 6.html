<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional question</title>
</head>
<body>
    <script>
        // input the number and check number is possitive or not.
        let num = prompt("enter a number: ");
        if(num>0){
            console.log(`${num} is the positive number`);
        }else if(num<0){
            console.log(`${num} is the negative  number`)
        }else{
            console.log(`${num} is the netural number`)
        }
    </script>
</body>
</html>
