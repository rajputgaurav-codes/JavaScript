<body>
    <script>
        // <!--FizzBuzz (Important Interview Question)

        //       1 se 20 tak loop chalao.

        //  Rules:

        //          Number 3 se divisible → "Fizz"
        //          Number 5 se divisible → "Buzz"
        //         Dono se divisible → "FizzBuzz"
        //         Warna number print karo-->

            let num = 20;
            for(let i = 1; i<=20;i++){
                if(i%3==0 && i%5 ==0 ){
                    console.log("FizzBuzz");
                }else if(i %5 ==0){
                    console.log("Buzz");
                }else if (i%3==0 ){
                    console.log("Fizz");
                }else{
                    console.log(i);
                }
               
            }



    </script>
