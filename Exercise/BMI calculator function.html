<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    <script>
        // BMI Calculator
        function bmi(weight,height){
            return weight / (height*height);
        }

        console.log(bmi(68,2.4).toFixed(2));  //tofixed use to print how many number after the decimal.
    </script>
</body>
</html>
