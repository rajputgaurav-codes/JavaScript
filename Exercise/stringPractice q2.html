<body>
    <script>
        //check the string is palindrome or not.
        let name = "rajput gaurav";
        let revname = "";
        for(let i = name.length -1; i>=0;i--){
            revname += name[i];
        }
        if(revname == name){
            console.log("it is palindorome");
        }else{
            console.log("it is not a palindrome")
        }
        console.log(revname);
    </script>
