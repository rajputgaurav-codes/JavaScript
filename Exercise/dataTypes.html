<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <script>
        let age = 24; //this is numberic data type.
        console.log(age);

        let price = 100.24; //this is also a numeric data type.
        console.log(price);

        let fullName = 'Zara bag'; //this is a string data type
        console.log(fullName);

        let isFollow = true; //this is a boolean data type
        console.log(isFollow);
    </script>
</body>
</html>
