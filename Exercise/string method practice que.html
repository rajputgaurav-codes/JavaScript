<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String method practice question</title>
</head>
<body>
    <script>
        //prompt the user to enter their full name. Generate a username for them based on the input. start username with @, following by their full name and ending with the fullname length.

        let username = prompt("Enter their full name without spacing: ")
        let fullname = "@" + username + username.length;
        console.log(fullname);

    </script>
</body>
