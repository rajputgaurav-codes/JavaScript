<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator function</title>
</head>
<body>
    <script>
        //Discount Calculator function (HOF)
        function diccountcalculator(discount){
            return function (price) {
                    return  price - price * (discount /100);
            }
        }

        let dicounter = diccountcalculator(20);
        console.log(dicounter(200));
    </script>
</body>
</html>
