<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Function Question</title>
  </head>
  <body>
    <script>
      //using function count vowels in the string.

      function vowels(str) {
        count = 0;
        for (let i = 0; i < str.length; i++) {
          if (
            str[i] === "a" ||
            str[i] === "e" ||
            str[i] === "i" ||
            str[i] === "o" ||
            str[i] === "u"
          ) {
            count++;
          }
        }
        return count;
      }

      console.log(vowels("gaurav"));

      //same task using arrow function

      let countVowels = (str) => {
        count = 0;
        for (let i = 0; i < str.length; i++) {
          if ("aeiouAEIOU".includes(str[i])) {
            count++;
          }
        }
        return count;
      };
      console.log(countVowels("Apna collage"));
    </script>
  </body>
</html>
