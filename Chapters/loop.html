<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop in JS</title>
</head>
<body>
    <script>
        //for loop------------------------------------------------------------------------------------------------
        for(let i=1;i<=5;i++){
            console.log("i= ",i);
        }
        //sum of those number
        let sum=0;
        for(let i=1;i<=5;i++){
            console.log("i= ",i);
            sum=sum+i;
        }
        console.log("sum= ",sum);

        //while loop ----------------------------------------------------------------------------------------------
        let i=1;
        while(i<=5){
            console.log("count= ",i);
        }
        //sum of those number
        let count=1;
        let s=0;
        while(count<=5){
            console.log("i = ",count);
            s = s+count;
        }
        console.log("sum is = ",s);

        //do while loop ---------------------------------------------------------------------------------------------
        let j=1;
        do{
            console.log(j);
            j++
        }while(j<=5);

        // for-of loop -------------------------------------------------------------------------------
         
        let str = "JavaScript"
        let size=0;
         for(let val of str){
            console.log("val = ",val);
            size=size + 1;
         }
         console.log("size = ",size );

        //for - in loop ------------------------------------------------------------------------------
         let student = {
            name:"gaurav",
            age:19,
            cgpa:8.18,
            ispass:true
         };

         for(let i in student){
            console.log("key = ",i, "value = ",student[i]);
         }
    </script>
</body>
</html>
