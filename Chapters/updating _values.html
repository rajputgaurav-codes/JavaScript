<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>updating values</title>
</head>
<body>
  <script>
     let pencilprice = 2;
     pencilprice =pencilprice+1;
     console.log(pencilprice);
     pencilprice *=4;
     console.log(pencilprice);
     pencilprice /=3;
     console.log(pencilprice);
  </script>
</body>
</html>
